<!doctype html>
<html>
  <head>
    <title>Student ID Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 30px;
}

h1 {
  text-align: center;
}

.form {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
}

input {
  padding: 8px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

.card h3 {
  margin: 0;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}
  </style>
     
  <body>
    <h1>Student ID Tracker</h1>

    <div class="form">
      <input id="name" placeholder="Name" />
      <input id="course" placeholder="Course" />
      <input id="email" placeholder="Email" />

      <button onclick="addStudent()">Add Student</button>
    </div>

    <div id="students" class="grid"></div>

    <script src="script.js"></script>
  </body>
</html>
